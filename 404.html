<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Webtaurants</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f8f9fa; color: #333; text-align: center; }
        .container { max-width: 500px; padding: 20px; }
        h1 { font-size: 8rem; margin: 0; color: #ff4757; }
        h2 { font-size: 1.5rem; margin-bottom: 20px; }
        p { color: #666; line-height: 1.6; margin-bottom: 30px; }
        .btn { display: inline-block; padding: 12px 24px; background: #2f3542; color: white; text-decoration: none; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: #57606f; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Change this number based on the error code -->
        <h1>404</h1>
        <h2>Oops! This page is off the menu.</h2>
        <p>We couldn't find the page you're looking for. It might have been moved, deleted, or never existed in the first place.</p>
        
        <!-- Helpful navigation links to keep users on your site -->
        <a href="https://www.webtaurants.space" class="btn">Return to Homepage</a>
    </div>
</body>
</html>
